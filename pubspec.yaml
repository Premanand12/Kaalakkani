name: kaalakkani
description: காலக்கணி - Tamil Calendar & Panchangam. No ads. No login. Offline.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.0.0

  # State management
  flutter_riverpod: ^2.5.0

  # Local database (SQLite — pre-populated .db in assets)
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  path: ^1.9.0

  # Local key-value storage
  hive_flutter: ^1.1.0

  # Home screen widget
  home_widget: ^0.6.0
  workmanager: ^0.9.0

  # Notifications
  flutter_local_notifications: ^17.0.0

  # HTTP for live data (gold rate, petrol)
  http: ^1.2.0

  # Share card generation
  screenshot: ^2.1.0
  share_plus: ^9.0.0

  # In-app purchase (ad removal)
  in_app_purchase: ^3.1.0

  # Utils
  intl: ^0.19.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.0

flutter:
  uses-material-design: true

  assets:
    - assets/db/kaalakkani.db
    - assets/data/
    - assets/images/

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#FFF8F2"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: false

  # fonts:  ← uncomment after placing TTF files in assets/fonts/
  #   - family: NotoSansTamil
  #     fonts:
  #       - asset: assets/fonts/NotoSansTamil-Regular.ttf
  #         weight: 400
  #       - asset: assets/fonts/NotoSansTamil-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/NotoSansTamil-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/NotoSansTamil-Bold.ttf
  #         weight: 700
